<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运输费报价系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #f5f6f8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* 动画几何线条层 */
        .geo-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .geo-layer svg {
            width: 100%;
            height: 100%;
        }

        .geo-layer line,
        .geo-layer circle,
        .geo-layer rect {
            stroke: #dce0e8;
            fill: none;
            stroke-width: 1;
        }

        /* 左下角旋转方块组 */
        @keyframes rotateSlow {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes floatUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes driftLeft {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(30px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 1;
        }

        .map-section {
            margin-top: 24px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e8ecf1;
            display: none;
        }
        .map-section.show {
            display: block;
        }
        #map {
            width: 100%;
            height: 360px;
        }

        .route-info {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a3c4a, #2c5364);
            color: #fff;
            padding: 10px 16px;
            font-size: 13px;
            display: flex;
            justify-content: center;
            gap: 24px;
            letter-spacing: 1px;
        }
        .route-info b {
            color: #f1c40f;
        }

        .marker-label {
            background: rgba(255,255,255,0.93) !important;
            border: none !important;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2) !important;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif !important;
            font-size: 11px !important;
            padding: 3px 7px !important;
            border-radius: 3px !important;
            white-space: nowrap;
        }
        .marker-label::before { display: none; }

        .leaflet-popup-content {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            font-size: 13px;
        }

        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 4px;
        }

        .lang-switcher select {
            padding: 4px 8px;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            font-size: 12px;
            background: #fff;
            color: #555;
            cursor: pointer;
            outline: none;
        }

        .lang-switcher select:focus {
            border-color: #1a3c4a;
        }

        .card h1 {
            text-align: center;
            color: #1a3c4a;
            font-size: 22px;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .card .subtitle {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            color: #555;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a3c4a;
            box-shadow: 0 0 0 3px rgba(26, 60, 74, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a3c4a, #2c5364);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .btn:hover {
            opacity: 0.92;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 8px;
            border: 1px solid #e8ecf1;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 15px;
            color: #555;
        }

        .result .row:not(:last-child) {
            border-bottom: 1px solid #e8ecf1;
        }

        .result .total {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid #1a3c4a;
            text-align: right;
            font-size: 22px;
            font-weight: bold;
            color: #c0392b;
        }

        .error-msg {
            margin-top: 16px;
            padding: 12px;
            background: #fff8f8;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            color: #a94442;
            font-size: 14px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* 底部诗句——直接写在背景上 */
        .poem-on-bg {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: #bcc2cc;
            font-size: 14px;
            letter-spacing: 3px;
            text-align: center;
            z-index: 1;
            pointer-events: none;
        }

        .poem-on-bg .source {
            color: #ccd2da;
            font-size: 11px;
            letter-spacing: 2px;
            margin-left: 12px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="lang-switcher">
        <select id="langSelect" onchange="switchLang(this.value)">
            <option value="zh">中文</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
        </select>
    </div>
    <h1 id="pageTitle">运 输 费 报 价</h1>
    <p class="subtitle">Logistics Quotation System</p>

    <div class="form-row">
        <div class="form-group">
            <label>长 (m)</label>
            <input type="number" id="length" step="0.001" min="0.001" placeholder="例：2.00">
        </div>
        <div class="form-group">
            <label>宽 (m)</label>
            <input type="number" id="width" step="0.001" min="0.001" placeholder="例：1.20">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>高 (m)</label>
            <input type="number" id="height" step="0.001" min="0.001" placeholder="例：1.50">
        </div>
        <div class="form-group">
            <label>数量</label>
            <input type="number" id="quantity" step="1" min="1" placeholder="例：10">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>重量 (kg)</label>
            <input type="number" id="weight" step="0.01" min="0.01" placeholder="例：800">
        </div>
        <div class="form-group">
            <label>品名</label>
            <select id="productId">
                <option value="">-- 请选择品名 --</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label id="lblOriginCountry">出发国家</label>
            <select id="originCountry" onchange="onOriginCountryChange()">
                <option value="">-- 请选择国家 --</option>
            </select>
        </div>
        <div class="form-group">
            <label id="lblOriginCity">出发城市</label>
            <select id="originCity" onchange="onLocationChange()">
                <option value="">-- 请先选择国家 --</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label id="lblDestCountry">到达国家</label>
            <select id="destCountry" onchange="onDestCountryChange()">
                <option value="">-- 请选择国家 --</option>
            </select>
        </div>
        <div class="form-group">
            <label id="lblDestCity">到达城市</label>
            <select id="destCity" onchange="onLocationChange()">
                <option value="">-- 请先选择国家 --</option>
            </select>
        </div>
    </div>

    <button class="btn" id="calcBtn" onclick="calculate()">计 算 报 价</button>

    <div class="map-section" id="mapSection">
        <div class="route-info" id="routeInfo" style="display:none;"></div>
        <div id="map"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="result">
        <div class="row">
            <span id="lblProduct">品名</span>
            <span id="resProduct"></span>
        </div>
        <div class="row">
            <span id="lblVolume">体积</span>
            <span id="resVolume"></span>
        </div>
        <div class="row">
            <span id="lblDensity">密度</span>
            <span id="resDensity"></span>
        </div>
        <div class="row">
            <span id="lblUnitPrice">单价</span>
            <span id="resUnitPrice"></span>
        </div>
        <div class="total">
            <span id="resTotal"></span>
        </div>
    </div>
</div>

</div>

<!-- 诗句直接写在背景上 -->
<div class="poem-on-bg">
    <span id="poemLine"></span>
    <span class="source" id="poemSource"></span>
</div>

    function updateMap(oCoord, dCoord, oName, dName) {
        if (!map) {
            map = L.map('map', {
                worldCopyJump: true
            }).setView([48, 80], 3);

            var primaryTiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
                attribution: '&copy; Esri &copy; OSM',
                maxZoom: 18,
                maxNativeZoom: 17
            }).addTo(map);

            var fallbackTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '',
                maxZoom: 18,
                maxNativeZoom: 19
            });

            var fallbackActive = false;
            primaryTiles.on('tileerror', function() {
                if (fallbackActive) return;
                fallbackActive = true;
                map.removeLayer(primaryTiles);
                fallbackTiles.addTo(map);
            });
            fallbackTiles.on('tileerror', function() {
                if (!fallbackActive) return;
                fallbackActive = false;
                map.removeLayer(fallbackTiles);
                primaryTiles.addTo(map);
            });

            var dragTimeout;
            map.on('dragend', function() {
                clearTimeout(dragTimeout);
                dragTimeout = setTimeout(function() {
                    (fallbackActive ? fallbackTiles : primaryTiles).redraw();
                }, 200);
            });
        }

        // 清除旧图层
        if (originMarker) map.removeLayer(originMarker);
        if (destMarker) map.removeLayer(destMarker);
        if (routeLine) map.removeLayer(routeLine);

        // 出发地标记（绿色圆形 + 文字标注）
        originMarker = L.layerGroup().addTo(map);
        L.circleMarker(oCoord, {
            radius: 9, fillColor: '#27ae60', color: '#fff',
            weight: 3, fillOpacity: 1
        }).addTo(originMarker);
        L.tooltip({ permanent: true, direction: 'bottom', offset: [0, 14],
            className: 'marker-label' })
            .setContent('<b>' + oName + '</b>').setLatLng(oCoord).addTo(originMarker);

        // 到达地标记（红色圆形 + 文字标注）
        destMarker = L.layerGroup().addTo(map);
        L.circleMarker(dCoord, {
            radius: 9, fillColor: '#e74c3c', color: '#fff',
            weight: 3, fillOpacity: 1
        }).addTo(destMarker);
        L.tooltip({ permanent: true, direction: 'bottom', offset: [0, 14],
            className: 'marker-label' })
            .setContent('<b>' + dName + '</b>').setLatLng(dCoord).addTo(destMarker);

        // 生成贝塞尔弧线
        var midLat = (oCoord[0] + dCoord[0]) / 2;
        var midLng = (oCoord[1] + dCoord[1]) / 2;
        var distDeg = Math.sqrt(
            Math.pow(dCoord[0] - oCoord[0], 2) + Math.pow(dCoord[1] - oCoord[1], 2)
        );
        var curve = Math.min(distDeg * 0.3, 22);
        var ctrlLat = midLat + curve;
        var ctrlLng = midLng;

        var arcPoints = [];
        var steps = 80;
        for (var t = 0; t <= 1; t += 1 / steps) {
            var u = 1 - t;
            arcPoints.push([
                u * u * oCoord[0] + 2 * u * t * ctrlLat + t * t * dCoord[0],
                u * u * oCoord[1] + 2 * u * t * ctrlLng + t * t * dCoord[1]
            ]);
        }

        // 透明光线
        routeLine = L.layerGroup().addTo(map);

        L.polyline(arcPoints, {
            color: '#5dade2', weight: 5, opacity: 0.18, smoothFactor: 1
        }).addTo(routeLine);

        L.polyline(arcPoints, {
            color: '#85c1e9', weight: 2, opacity: 0.55, smoothFactor: 1
        }).addTo(routeLine);

        // 大圆距离 + 信息条
        var R = 6371;
        var d2r = Math.PI / 180;
        var lat1 = oCoord[0] * d2r, lat2 = dCoord[0] * d2r;
        var dlng = (dCoord[1] - oCoord[1]) * d2r;
        var sd = Math.sin((lat2 - lat1) / 2);
        var a = sd * sd + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dlng / 2) * Math.sin(dlng / 2);
        var distKm = Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));

        var info = document.getElementById('routeInfo');
        info.style.display = 'flex';
        info._routeData = { distKm: distKm };
        info.innerHTML = '<span>' + oName + ' <b style="font-size:16px;margin:0 4px;">→</b> ' + dName + '</span>' +
            '<span>' + t('routeDist') + ': <b>' + distKm + ' km</b></span>';

        // 视野：显式包含两个端点
        map.invalidateSize();
        var bounds = L.latLngBounds([oCoord, dCoord]);
        map.fitBounds(bounds, { padding: [60, 60], animate: false });
    }

    }

    const today = getTodayPoem();
    document.getElementById('poemLine').textContent = today.line;
    document.getElementById('poemSource').textContent = today.source;

    function productDisplayName(p) {
        if (currentLang === 'ru') return p.nameRu || p.name;
        if (currentLang === 'en') return p.nameEn || p.name;
        return p.name;
    }

    function renderProductOptions() {
        const select = document.getElementById('productId');
        while (select.options.length > 1) select.remove(1);
        productsMap.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = productDisplayName(p);
            select.appendChild(opt);
        });
    }

    async function loadProducts() {
        try {
            const res = await fetch(API + '/products');
            const json = await res.json();
            if (json.code === 200 && json.data && json.data.length > 0) {
                json.data.forEach(p => productsMap.set(p.id, p));
                renderProductOptions();
            }
        } catch (e) {
            showError(t('loadFailed') + e.message);
        }
    }

    async function calculate() {
        const length = document.getElementById('length').value;
        const width = document.getElementById('width').value;
        const height = document.getElementById('height').value;
        const quantity = document.getElementById('quantity').value;
        const weight = document.getElementById('weight').value;
        const productId = document.getElementById('productId').value;

        hideError();
        hideResult();

        if (!length || !width || !height || !quantity || !weight || !productId) {
            showError(t('fillAll'));
            return;
        }

        lastProductId = parseInt(productId);

        const btn = document.getElementById('calcBtn');
        btn.disabled = true;
        btn.dataset.loading = 'true';
        btn.textContent = t('calculating');

        try {
            const res = await fetch(API + '/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    length: length,
                    width: width,
                    height: height,
                    quantity: parseInt(quantity),
                    weight: weight,
                    productId: parseInt(productId)
                })
            });

            const json = await res.json();

            if (res.status === 429) {
                showError(t('rateLimit'));
                return;
            }

            if (json.code === 200 && json.data) {
                showResult(json.data);
            } else {
                showError(json.message || t('calcFailed'));
            }
        } catch (e) {
            showError(t('networkError') + e.message);
        } finally {
            btn.disabled = false;
            btn.dataset.loading = 'false';
            btn.textContent = t('calcBtn');
        }
    }

    function showResult(data) {
        let displayName = data.productName;
        if (lastProductId && productsMap.has(lastProductId)) {
            displayName = productDisplayName(productsMap.get(lastProductId));
        }
        document.getElementById('resProduct').textContent = displayName;
        document.getElementById('resVolume').textContent = data.volume + ' m³';
        document.getElementById('resDensity').textContent = data.density + ' kg/m³';
        document.getElementById('resUnitPrice').textContent = data.unitPrice + t('unitPriceSuffix');
        document.getElementById('resTotal').textContent = t('totalPrefix') + data.totalPrice + t('totalSuffix');
        document.getElementById('result').classList.add('show');
    }

    function hideResult() {
        document.getElementById('result').classList.remove('show');
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.add('show');
    }

    function hideError() {
        document.getElementById('errorMsg').classList.remove('show');
    }

    initCountrySelectors();
    applyTranslations();
    loadProducts();
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
</html>
