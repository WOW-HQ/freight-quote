<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户创建</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 背景图 + 全屏居中容器 */
        body {
            width: 100vw;
            height: 100vh;
            background: url('https://picsum.photos/1920/1080?blur=2') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 半透明卡片容器 */
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* 标题样式 */
        .login-card h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        /* 表单组样式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        /* 结果提示 */
        #result {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
        }

        .success {
            color: #28a745;
        }

        .error {
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>用户创建</h1>
    <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" required>
    </div>
    <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" required>
    </div>
    <div class="form-group">
        <label for="nickname">昵称（选填）</label>
        <input type="text" id="nickname" placeholder="请输入昵称">
    </div>
    <div class="form-group">
        <label for="phone">手机号（选填）</label>
        <input type="text" id="phone" placeholder="请输入手机号">
    </div>
    <div class="form-group">
        <label for="email">邮箱（选填）</label>
        <input type="text" id="email" placeholder="请输入邮箱">
    </div>
    <button class="submit-btn" onclick="addUser()">创建用户</button>
    <div id="result"></div>
</div>

<script>
    // 你的接口完整地址，和后端的 @RequestMapping 保持一致
    const API_URL = "/test/addUser";

    async function addUser() {
        // 1. 获取表单数据，和 SysUser 类的字段一一对应
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const nickname = document.getElementById('nickname').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const resultDiv = document.getElementById('result');

        // 非空校验（用户名和密码是必填项）
        if (!username || !password) {
            resultDiv.className = 'error';
            resultDiv.innerText = '用户名和密码不能为空！';
            return;
        }

        // 2. 直接构造和后端 SysUser 结构完全匹配的对象
        const user = {
            username: username,
            password: password,
            nickname: nickname || null,
            phone: phone || null,
            email: email || null
        };

        try {
            // 3. 发送 JSON 对象到后端
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(user)
            });

            const data = await response.text();
            if (response.ok) {
                resultDiv.className = 'success';
                resultDiv.innerText = `创建成功！返回结果：${data}`;
            } else {
                resultDiv.className = 'error';
                resultDiv.innerText = `请求失败：${response.status} ${response.statusText}`;
            }
        } catch (error) {
            resultDiv.className = 'error';
            resultDiv.innerText = `请求出错：${error.message}`;
        }
    }
</script>
</body>
</html>
