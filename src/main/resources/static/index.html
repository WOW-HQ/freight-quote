<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运输费报价系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: #f5f6f8;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 动画几何线条层 */
        .geo-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .geo-layer svg {
            width: 100%;
            height: 100%;
        }

        .geo-layer line,
        .geo-layer circle,
        .geo-layer rect {
            stroke: #dce0e8;
            fill: none;
            stroke-width: 1;
        }

        /* 左下角旋转方块组 */
        @keyframes rotateSlow {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes floatUp {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes driftLeft {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(30px); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 1;
        }

        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 4px;
        }

        .lang-switcher select {
            padding: 4px 8px;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            font-size: 12px;
            background: #fff;
            color: #555;
            cursor: pointer;
            outline: none;
        }

        .lang-switcher select:focus {
            border-color: #1a3c4a;
        }

        .card h1 {
            text-align: center;
            color: #1a3c4a;
            font-size: 22px;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .card .subtitle {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }

        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 18px;
        }

        .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            color: #555;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #1a3c4a;
            box-shadow: 0 0 0 3px rgba(26, 60, 74, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1a3c4a, #2c5364);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .btn:hover {
            opacity: 0.92;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f5f7fa;
            border-radius: 8px;
            border: 1px solid #e8ecf1;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result .row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 15px;
            color: #555;
        }

        .result .row:not(:last-child) {
            border-bottom: 1px solid #e8ecf1;
        }

        .result .total {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px solid #1a3c4a;
            text-align: right;
            font-size: 22px;
            font-weight: bold;
            color: #c0392b;
        }

        .error-msg {
            margin-top: 16px;
            padding: 12px;
            background: #fff8f8;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            color: #a94442;
            font-size: 14px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* 底部诗句——直接写在背景上 */
        .poem-on-bg {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: #bcc2cc;
            font-size: 14px;
            letter-spacing: 3px;
            text-align: center;
            z-index: 1;
            pointer-events: none;
        }

        .poem-on-bg .source {
            color: #ccd2da;
            font-size: 11px;
            letter-spacing: 2px;
            margin-left: 12px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="lang-switcher">
        <select id="langSelect" onchange="switchLang(this.value)">
            <option value="zh">中文</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
        </select>
    </div>
    <h1 id="pageTitle">运 输 费 报 价</h1>
    <p class="subtitle">Logistics Quotation System</p>

    <div class="form-row">
        <div class="form-group">
            <label>长 (m)</label>
            <input type="number" id="length" step="0.001" min="0.001" placeholder="例：2.00">
        </div>
        <div class="form-group">
            <label>宽 (m)</label>
            <input type="number" id="width" step="0.001" min="0.001" placeholder="例：1.20">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>高 (m)</label>
            <input type="number" id="height" step="0.001" min="0.001" placeholder="例：1.50">
        </div>
        <div class="form-group">
            <label>数量</label>
            <input type="number" id="quantity" step="1" min="1" placeholder="例：10">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>重量 (kg)</label>
            <input type="number" id="weight" step="0.01" min="0.01" placeholder="例：800">
        </div>
        <div class="form-group">
            <label>品名</label>
            <select id="productId">
                <option value="">-- 请选择品名 --</option>
            </select>
        </div>
    </div>

    <button class="btn" id="calcBtn" onclick="calculate()">计 算 报 价</button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="result">
        <div class="row">
            <span id="lblProduct">品名</span>
            <span id="resProduct"></span>
        </div>
        <div class="row">
            <span id="lblVolume">体积</span>
            <span id="resVolume"></span>
        </div>
        <div class="row">
            <span id="lblDensity">密度</span>
            <span id="resDensity"></span>
        </div>
        <div class="row">
            <span id="lblUnitPrice">单价</span>
            <span id="resUnitPrice"></span>
        </div>
        <div class="total">
            <span id="resTotal"></span>
        </div>
    </div>
</div>

<!-- 诗句直接写在背景上 -->
<div class="poem-on-bg">
    <span id="poemLine"></span>

</div>

            placeholderQuantity: 'e.g. 10',

            placeholderProduct: '-- Select Product --',
            calcBtn: 'Calculate Quote',
            calculating: 'Calculating...',
            resProduct: 'Product',
            resVolume: 'Volume',
            resDensity: 'Density',
            resUnitPrice: 'Unit Price',
            totalPrefix: 'Total: ',
            unitPriceSuffix: ' $/kg',
            totalSuffix: ' $',

            rateLimit: 'Too many requests, please try again later',
            calcFailed: 'Calculation failed',
            networkError: 'Network error: ',
            loadFailed: 'Failed to load product list: '
        }

    let currentLang = localStorage.getItem('lang') || 'zh';
    const productsMap = new Map(); // id -> {id, name, nameRu, nameEn}
    let lastProductId = null;

    function t(key) {
        return i18n[currentLang]?.[key] || i18n.zh[key] || key;
    }

    function switchLang(lang) {
        currentLang = lang;
        localStorage.setItem('lang', lang);
        applyTranslations();
    }

    function applyTranslations() {
        document.getElementById('langSelect').value = currentLang;
        document.getElementById('pageTitle').textContent = t('pageTitle');
        setLabels();
        document.getElementById('length').placeholder = t('placeholderLength');
        document.getElementById('width').placeholder = t('placeholderWidth');
        document.getElementById('height').placeholder = t('placeholderHeight');
        document.getElementById('quantity').placeholder = t('placeholderQuantity');
        document.getElementById('weight').placeholder = t('placeholderWeight');
        const productSelect = document.getElementById('productId');
        const firstOpt = productSelect.options[0];
        if (firstOpt && firstOpt.value === '') {
            firstOpt.textContent = t('placeholderProduct');
        }
        renderProductOptions();
        document.getElementById('lblProduct').textContent = t('resProduct');
        document.getElementById('lblVolume').textContent = t('resVolume');
        document.getElementById('lblDensity').textContent = t('resDensity');
        document.getElementById('lblUnitPrice').textContent = t('resUnitPrice');
        const btn = document.getElementById('calcBtn');
        if (!btn.dataset.loading || btn.dataset.loading !== 'true') {
            btn.textContent = t('calcBtn');
        }
    }

    function setLabels() {
        const labels = document.querySelectorAll('.form-group label');
        const keys = ['length', 'width', 'height', 'quantity', 'weight', 'product'];
        labels.forEach((label, i) => {
            if (i < keys.length) {
                label.textContent = t(keys[i]);
            }
        });
    }

    // 毛主席诗句库：每句包含诗句和出处
    const poems = [
        { line: '雄关漫道真如铁，而今迈步从头越。', source: '—— 《忆秦娥·娄山关》' },
        { line: '天若有情天亦老，人间正道是沧桑。', source: '—— 《七律·人民解放军占领南京》' },
        { line: '为有牺牲多壮志，敢教日月换新天。', source: '—— 《七律·到韶山》' },

        { line: '独有英雄驱虎豹，更无豪杰怕熊罴。', source: '—— 《七律·冬云》' },
        { line: '不管风吹浪打，胜似闲庭信步。', source: '—— 《水调歌头·游泳》' },
        { line: '待到山花烂漫时，她在丛中笑。', source: '—— 《卜算子·咏梅》' },
        { line: '多少事，从来急；天地转，光阴迫。', source: '—— 《满江红·和郭沫若同志》' },
        { line: '敌军围困万千重，我自岿然不动。', source: '—— 《西江月·井冈山》' },
        { line: '宜将剩勇追穷寇，不可沽名学霸王。', source: '—— 《七律·人民解放军占领南京》' },
        { line: '牢骚太盛防肠断，风物长宜放眼量。', source: '—— 《七律·和柳亚子先生》' },
        { line: '指点江山，激扬文字，粪土当年万户侯。', source: '—— 《沁园春·长沙》' },
        { line: '苍山如海，残阳如血。', source: '—— 《忆秦娥·娄山关》' },
        { line: '可上九天揽月，可下五洋捉鳖。', source: '—— 《水调歌头·重上井冈山》' },
        { line: '中华儿女多奇志，不爱红装爱武装。', source: '—— 《七绝·为女民兵题照》' },
        { line: '横空出世，莽昆仑，阅尽人间春色。', source: '—— 《念奴娇·昆仑》' },
        { line: '风雨送春归，飞雪迎春到。', source: '—— 《卜算子·咏梅》' },
        { line: '萧瑟秋风今又是，换了人间。', source: '—— 《浪淘沙·北戴河》' },
        { line: '装点此关山，今朝更好看。', source: '—— 《菩萨蛮·大柏地》' },
        { line: '东方欲晓，莫道君行早。', source: '—— 《清平乐·会昌》' },
        { line: '雄鸡一唱天下白，万方乐奏有于阗。', source: '—— 《浣溪沙·和柳亚子先生》' },
        { line: '斑竹一枝千滴泪，红霞万朵百重衣。', source: '—— 《七律·答友人》' },
        { line: '金猴奋起千钧棒，玉宇澄清万里埃。', source: '—— 《七律·和郭沫若同志》' },
        { line: '喜看稻菽千重浪，遍地英雄下夕烟。', source: '—— 《七律·到韶山》' },
        { line: '坐地日行八万里，巡天遥看一千河。', source: '—— 《七律二首·送瘟神》' },
        { line: '红雨随心翻作浪，青山着意化为桥。', source: '—— 《七律二首·送瘟神》' },
        { line: '冷眼向洋看世界，热风吹雨洒江天。', source: '—— 《七律·登庐山》' }
    ];

    // 根据日期选择今日诗句
    function getTodayPoem() {
        const day = new Date().getDate();
        return poems[day % poems.length];
    }

    const today = getTodayPoem();
    document.getElementById('poemLine').textContent = today.line;
    document.getElementById('poemSource').textContent = today.source;

    function productDisplayName(p) {
        if (currentLang === 'ru') return p.nameRu || p.name;
        if (currentLang === 'en') return p.nameEn || p.name;
        return p.name;
    }

    function renderProductOptions() {
        const select = document.getElementById('productId');
        while (select.options.length > 1) select.remove(1);
        productsMap.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = productDisplayName(p);
            select.appendChild(opt);
        });
    }

    async function loadProducts() {
        try {
            const res = await fetch(API + '/products');
            const json = await res.json();
            if (json.code === 200 && json.data && json.data.length > 0) {
                json.data.forEach(p => productsMap.set(p.id, p));
                renderProductOptions();
            }
        } catch (e) {
            showError(t('loadFailed') + e.message);
        }
    }

    async function calculate() {
        const length = document.getElementById('length').value;
        const width = document.getElementById('width').value;
        const height = document.getElementById('height').value;
        const quantity = document.getElementById('quantity').value;
        const weight = document.getElementById('weight').value;
        const productId = document.getElementById('productId').value;

        hideError();
        hideResult();

        if (!length || !width || !height || !quantity || !weight || !productId) {
            showError(t('fillAll'));
            return;
        }

        lastProductId = parseInt(productId);

        const btn = document.getElementById('calcBtn');
        btn.disabled = true;
        btn.dataset.loading = 'true';
        btn.textContent = t('calculating');

        try {
            const res = await fetch(API + '/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    length: length,
                    width: width,
                    height: height,
                    quantity: parseInt(quantity),
                    weight: weight,
                    productId: parseInt(productId)
                })
            });

            const json = await res.json();

            if (res.status === 429) {
                showError(t('rateLimit'));
                return;
            }

            if (json.code === 200 && json.data) {
                showResult(json.data);
            } else {
                showError(json.message || t('calcFailed'));
            }
        } catch (e) {
            showError(t('networkError') + e.message);
        } finally {
            btn.disabled = false;
            btn.dataset.loading = 'false';
            btn.textContent = t('calcBtn');
        }
    }

    function showResult(data) {
        let displayName = data.productName;
        if (lastProductId && productsMap.has(lastProductId)) {
            displayName = productDisplayName(productsMap.get(lastProductId));
        }
        document.getElementById('resProduct').textContent = displayName;
        document.getElementById('resVolume').textContent = data.volume + ' m³';
        document.getElementById('resDensity').textContent = data.density + ' kg/m³';
        document.getElementById('resUnitPrice').textContent = data.unitPrice + t('unitPriceSuffix');
        document.getElementById('resTotal').textContent = t('totalPrefix') + data.totalPrice + t('totalSuffix');
        document.getElementById('result').classList.add('show');
    }

    function hideResult() {
        document.getElementById('result').classList.remove('show');
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.add('show');
    }

    function hideError() {
        document.getElementById('errorMsg').classList.remove('show');
    }

    applyTranslations();
    loadProducts();
</script>
</body>
</html>
