<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运输费报价系统</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="card">
    <div class="lang-switcher">
        <select id="langSelect" onchange="switchLang(this.value)">
            <option value="zh">中文</option>
            <option value="ru">Русский</option>
            <option value="en">English</option>
        </select>
    </div>
    <h1 id="pageTitle">运 输 费 报 价</h1>
    <p class="subtitle">Logistics Quotation System</p>

    <div class="form-row">
        <div class="form-group">
            <label>长 (m)</label>
            <input type="number" id="length" step="0.001" min="0.001" placeholder="例：2.00">
        </div>
        <div class="form-group">
            <label>宽 (m)</label>
            <input type="number" id="width" step="0.001" min="0.001" placeholder="例：1.20">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>高 (m)</label>
            <input type="number" id="height" step="0.001" min="0.001" placeholder="例：1.50">
        </div>
        <div class="form-group">
            <label>数量</label>
            <input type="number" id="quantity" step="1" min="1" placeholder="例：10">
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>重量 (kg)</label>
            <input type="number" id="weight" step="0.01" min="0.01" placeholder="例：800">
        </div>
        <div class="form-group">
            <label>品名</label>
            <select id="productId">
                <option value="">-- 请选择品名 --</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label id="lblOriginCountry">出发国家</label>
            <select id="originCountry" onchange="onOriginCountryChange()">
                <option value="">-- 请选择国家 --</option>
            </select>
        </div>
        <div class="form-group">
            <label id="lblOriginCity">出发城市</label>
            <select id="originCity" onchange="onLocationChange()">
                <option value="">-- 请先选择国家 --</option>
            </select>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label id="lblDestCountry">到达国家</label>
            <select id="destCountry" onchange="onDestCountryChange()">
                <option value="">-- 请选择国家 --</option>
            </select>
        </div>
        <div class="form-group">
            <label id="lblDestCity">到达城市</label>
            <select id="destCity" onchange="onLocationChange()">
                <option value="">-- 请先选择国家 --</option>
            </select>
        </div>
    </div>

    <button class="btn" id="calcBtn" onclick="calculate()">计 算 报 价</button>

    <div class="map-section" id="mapSection">
        <div class="route-info" id="routeInfo" style="display:none;"></div>
        <div id="map"></div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result" id="result">
        <div class="row">
            <span id="lblProduct">品名</span>
            <span id="resProduct"></span>
        </div>
        <div class="row">
            <span id="lblVolume">体积</span>
            <span id="resVolume"></span>
        </div>
        <div class="row">
            <span id="lblDensity">密度</span>
            <span id="resDensity"></span>
        </div>
        <div class="row">
            <span id="lblUnitPrice">单价</span>
            <span id="resUnitPrice"></span>
        </div>
        <div class="total">
            <span id="resTotal"></span>
        </div>
    </div>
</div>

<div class="geo-layer">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
        <g style="transform-origin: 180px 720px; animation: rotateSlow 30s linear infinite;">
            <rect x="120" y="660" width="120" height="120"/>

        </g>

            <rect x="1343" y="143" width="74" height="74" transform="rotate(45 1380 180)"/>
        </g>
        <g style="animation: floatUp 13s ease-in-out infinite;">
            <line x1="1000" y1="820" x2="1430" y2="820"/>

            <line x1="50" y1="510" x2="200" y2="510"/>
        </g>
        <g style="animation: pulse 8s ease-in-out infinite;">
            <rect x="500" y="790" width="220" height="80"/>
            <line x1="500" y1="830" x2="720" y2="830"/>
            <line x1="610" y1="790" x2="610" y2="870"/>
        </g>
        <g style="transform-origin: 700px 250px; animation: rotateSlow 45s linear infinite reverse;">
            <line x1="700" y1="200" x2="640" y2="300"/>

        </g>
        <g style="animation: floatUp 9s ease-in-out infinite;">
            <line x1="320" y1="300" x2="380" y2="300"/>

            <line x1="300" y1="250" x2="320" y2="250"/>
            <line x1="360" y1="360" x2="400" y2="360"/>

        </g>
        <g style="transform-origin: 1300px 60px; animation: rotateSlow 25s linear infinite;">

        </g>
        <g style="transform-origin: 750px 650px; animation: rotateSlow 35s linear infinite;">
            <line x1="690" y1="590" x2="810" y2="710"/>
            <line x1="810" y1="590" x2="690" y2="710"/>
            <line x1="705" y1="605" x2="795" y2="695"/>
        </g>
        <g style="transform-origin: 50px 800px; animation: rotateSlow 20s linear infinite reverse;">
            <line x1="50" y1="760" x2="10" y2="820"/>
            <line x1="50" y1="760" x2="90" y2="820"/>
            <line x1="10" y1="820" x2="90" y2="820"/>
        </g>
        <g style="animation: floatUp 11s ease-in-out infinite;">
            <line x1="1050" y1="80" x2="1100" y2="80"/>
            <line x1="1060" y1="100" x2="1090" y2="100"/>
            <line x1="1030" y1="130" x2="1120" y2="130"/>
            <line x1="1040" y1="160" x2="1110" y2="160"/>
        </g>
        <g style="transform-origin: 550px 500px; animation: rotateSlow 28s linear infinite;">
            <rect x="520" y="470" width="60" height="60"/>
            <rect x="531" y="481" width="38" height="38"/>
        </g>
        <g style="animation: pulse 5.5s ease-in-out infinite;">
            <circle cx="150" cy="380" r="6"/>
            <circle cx="180" cy="400" r="8"/>
            <circle cx="210" cy="390" r="5"/>
            <circle cx="230" cy="420" r="7"/>
            <line x1="150" y1="380" x2="180" y2="400"/>
            <line x1="180" y1="400" x2="210" y2="390"/>
            <line x1="210" y1="390" x2="230" y2="420"/>
        </g>
        <g style="animation: floatUp 18s ease-in-out infinite;">
            <line x1="1150" y1="700" x2="1250" y2="700"/>
            <line x1="1150" y1="730" x2="1250" y2="730"/>
            <line x1="1150" y1="700" x2="1150" y2="730"/>
            <line x1="1200" y1="700" x2="1200" y2="730"/>
            <line x1="1250" y1="700" x2="1250" y2="730"/>
        </g>
        <g style="animation: driftLeft 12s ease-in-out infinite;">
            <line x1="800" y1="120" x2="880" y2="120"/>
            <line x1="880" y1="120" x2="880" y2="180"/>
            <line x1="880" y1="180" x2="960" y2="180"/>
            <line x1="960" y1="180" x2="960" y2="140"/>
        </g>
    </svg>
</div>

<div class="poem-on-bg">
    <span id="poemLine"></span>
    <span class="source" id="poemSource"></span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/cities.js"></script>
<script src="js/app.js"></script>
</body>
</html>
